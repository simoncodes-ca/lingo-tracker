name: PR Check

on:
  pull_request:
    branches:
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Format, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate tracker i18n types
        run: pnpm nx build cli && node dist/apps/cli/main.js bundle --name tracker

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Derive NX_BASE
        id: nx-base
        run: echo "NX_BASE=origin/${{ github.event.pull_request.base.ref }}" >> "$GITHUB_OUTPUT"

      - name: Test (affected)
        run: pnpm nx affected -t test --base=${{ steps.nx-base.outputs.NX_BASE }}

      - name: Build (affected)
        run: pnpm nx affected -t build --base=${{ steps.nx-base.outputs.NX_BASE }}
