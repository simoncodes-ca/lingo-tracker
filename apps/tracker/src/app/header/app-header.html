<mat-toolbar class="app-toolbar">
  <div class="toolbar-content">
    <!-- Logo and Title -->
    <a class="brand" [routerLink]="['/collections']" aria-label="Go to Collections" matTooltip="Go to Collections">
      <img src="assets/logo-rounded.png" class="logo-icon" alt="LingoTracker logo" />
      <h1 class="app-title">LingoTracker</h1>
    </a>

    <!-- Collection context: pipe + name + folder -->
    @if (hasCollectionContext()) {
      <div class="collection-pipe" aria-hidden="true"></div>

      <!-- Back to Collections -->
      <button mat-icon-button [routerLink]="['/collections']" aria-label="Back to Collections" matTooltip="Back to Collections" class="back-button">
        <mat-icon>arrow_back</mat-icon>
      </button>

      <div class="collection-context">
        <span class="collection-name" [title]="collectionName() ?? ''">{{ collectionName() }}</span>
        <span class="context-separator" aria-hidden="true">·</span>
        <span class="collection-folder" [title]="translationsFolder() ?? ''">{{ translationsFolder() }}</span>
      </div>
    }

    <!-- Spacer -->
    <span class="toolbar-spacer"></span>

    <!-- Stat chips (next to gear) -->
    @if (hasCollectionContext()) {
      <div class="header-stats">
        @if (statsLoading()) {
          <div class="skeleton-chip" aria-hidden="true"></div>
          <div class="skeleton-chip" aria-hidden="true"></div>
        } @else if (totalKeys() !== null) {
          <span class="stat-chip">{{ keysText() }}</span>
          <span class="stat-chip">{{ localesText() }}</span>
        }
      </div>
    }

    <!-- Theme Switcher -->
    <button
      mat-icon-button
      [matMenuTriggerFor]="themeMenu"
      [attr.aria-label]="TOKENS.THEME.SETTINGS | transloco"
      class="theme-button"
    >
      <mat-icon>settings</mat-icon>
    </button>

    <mat-menu #themeMenu="matMenu">
      <button mat-menu-item (click)="setTheme('light')" [class.active]="isThemeActive('light')">
        <mat-icon>light_mode</mat-icon>
        <span>{{ TOKENS.THEME.LIGHT | transloco }}</span>
        @if (isThemeActive('light')) {
          <mat-icon class="check-icon">check</mat-icon>
        }
      </button>

      <button mat-menu-item (click)="setTheme('dark')" [class.active]="isThemeActive('dark')">
        <mat-icon>dark_mode</mat-icon>
        <span>{{ TOKENS.THEME.DARK | transloco }}</span>
        @if (isThemeActive('dark')) {
          <mat-icon class="check-icon">check</mat-icon>
        }
      </button>

      <button mat-menu-item (click)="setTheme('system')" [class.active]="isThemeActive('system')">
        <mat-icon>computer</mat-icon>
        <span>{{ TOKENS.THEME.SYSTEM | transloco }}</span>
        @if (isThemeActive('system')) {
          <mat-icon class="check-icon">check</mat-icon>
        }
      </button>
    </mat-menu>
  </div>
</mat-toolbar>
