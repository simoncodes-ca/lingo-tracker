<mat-toolbar class="app-toolbar">
  <div class="toolbar-content">
    <!-- Logo and Title -->
    <div class="brand">
      <mat-icon class="logo-icon">translate</mat-icon>
      <h1 class="app-title">LingoTracker</h1>
    </div>

    <!-- Spacer -->
    <span class="toolbar-spacer"></span>

    <!-- Theme Switcher -->
    <button
      mat-icon-button
      [matMenuTriggerFor]="themeMenu"
      aria-label="Theme settings"
      class="theme-button"
    >
      <mat-icon>settings</mat-icon>
    </button>

    <mat-menu #themeMenu="matMenu">
      <button
        mat-menu-item
        (click)="setTheme('light')"
        [class.active]="isThemeActive('light')"
      >
        <mat-icon>light_mode</mat-icon>
        <span>Light</span>
        @if (isThemeActive('light')) {
          <mat-icon class="check-icon">check</mat-icon>
        }
      </button>

      <button
        mat-menu-item
        (click)="setTheme('dark')"
        [class.active]="isThemeActive('dark')"
      >
        <mat-icon>dark_mode</mat-icon>
        <span>Dark</span>
        @if (isThemeActive('dark')) {
          <mat-icon class="check-icon">check</mat-icon>
        }
      </button>

      <button
        mat-menu-item
        (click)="setTheme('system')"
        [class.active]="isThemeActive('system')"
      >
        <mat-icon>computer</mat-icon>
        <span>System</span>
        @if (isThemeActive('system')) {
          <mat-icon class="check-icon">check</mat-icon>
        }
      </button>
    </mat-menu>
  </div>
</mat-toolbar>
