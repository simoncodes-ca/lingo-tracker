<mat-toolbar class="app-header">
  <!-- Title -->
  <span class="app-title">Lingo Tracker</span>

  <!-- Version -->
  <pill class="version-pill" [text]="'V: ' + appVersion()" [type]="'info'"></pill>

  <!-- Spacer -->
  <span class="spacer"></span>

  <div class="header-controls">
    <!-- Theme toggle -->
    <div class="theme-toggle">
      <mat-icon>light_mode</mat-icon>
      <mat-slide-toggle
        [checked]="isDarkTheme()"
        (change)="toggleTheme()"
        aria-label="Toggle dark theme">
      </mat-slide-toggle>
      <mat-icon>dark_mode</mat-icon>
    </div>
  </div>
</mat-toolbar>
