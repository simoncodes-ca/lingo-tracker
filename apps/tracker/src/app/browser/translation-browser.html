<div class="translation-browser">
  <div class="browser-content">
    <!-- Left Sidebar: Folder Tree -->
    <aside class="folder-sidebar">
      <app-sidebar-header
        [collectionName]="collectionName()"
        [translationsFolder]="translationsFolder()"
        (backClick)="navigateToCollections()"
      />
      <app-folder-tree
        [collectionName]="collectionName()"
      />
    </aside>

    <!-- Main Content: Translation List -->
    <main class="translation-main">
      <app-translation-header />

      @if (collectionName() && activeLocales().length > 0) {
        <app-translation-list
          [collectionName]="collectionName()"
          [baseLocale]="baseLocale()"
        />
      }

      @if (collectionName() && activeLocales().length === 0) {
        <div class="loading-config">
          <p>{{ TOKENS.BROWSER.LOADINGCOLLECTIONCONFIGURATION | transloco }}</p>
        </div>
      }
    </main>
  </div>
</div>
