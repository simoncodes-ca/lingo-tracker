<div class="compact-controls">
  @if (localeStates().length) {
    <app-translation-rollup
      [locales]="localeStates()"
      [baseLocale]="baseLocale()"
    />
  }

  <button
    class="icon-button comment-button"
    [class.comment-button--active]="showComment()"
    mat-icon-button
    [disabled]="commentDisabled()"
    (click)="onCommentClick($event)"
    [attr.aria-label]="showComment() ? 'Hide comment' : 'Show comment'"
  >
    <mat-icon>{{ commentIcon() }}</mat-icon>
  </button>

  <button
    #tagsTooltip="matTooltip"
    class="icon-button tags-button"
    mat-icon-button
    [disabled]="tagsDisabled()"
    [matTooltip]="tagsTooltipText()"
    [matTooltipDisabled]="tagsDisabled()"
    matTooltipPosition="below"
    (click)="onTagsClick($event)"
    aria-label="View tags"
  >
    <mat-icon>label</mat-icon>
  </button>

  <button
    mat-icon-button
    type="button"
    [matMenuTriggerFor]="menu"
    aria-label="More actions"
  >
    <mat-icon>more_vert</mat-icon>
  </button>

  <mat-menu #menu="matMenu">
    <button mat-menu-item (click)="onEdit()" aria-label="Edit translation">
      <mat-icon>edit</mat-icon>
      <span>{{ TOKENS.COMMON.ACTIONS.EDIT | transloco }}</span>
    </button>
    <button mat-menu-item (click)="onMove()" aria-label="Move translation">
      <mat-icon>drive_file_move</mat-icon>
      <span>{{ TOKENS.COMMON.ACTIONS.MOVE | transloco }}</span>
    </button>
    <button mat-menu-item (click)="onDelete()" aria-label="Delete translation">
      <mat-icon>delete</mat-icon>
      <span>{{ TOKENS.COMMON.ACTIONS.DELETE | transloco }}</span>
    </button>
  </mat-menu>
</div>
