<div
  class="item-container"
  role="listitem"
  [attr.data-density]="currentDensityMode()"
  [class.expanded]="currentDensityMode() === 'full' && isExpanded()"
  [class.touch-pressed]="isTouchPressed()"
  [class.recently-updated]="isRecentlyUpdated()"
  (touchstart)="onTouchStart($event)"
  (touchend)="onTouchEnd($event)"
  (keydown)="onKeyDown($event)"
  tabindex="0"
  cdkDrag
  [cdkDragData]="dragData()"
  [cdkDragDisabled]="isDragDisabled()"
  (cdkDragStarted)="onDragStarted()"
  (cdkDragEnded)="onDragEnded()"
>
  <span
    id="{{ statusId() }}"
    class="sr-only"
    style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;"
  >
    {{ statusBreakdown() }}
  </span>

  @if (currentDensityMode() === 'compact') {
    <!-- Compact: 2-row layout -->
    <app-translation-item-header
      [fullKey]="fullKey()"
      [localeStates]="localeStates()"
      [baseLocale]="baseLocale()"
      [comment]="translation().comment"
      [showComment]="showComment()"
      [tags]="translation().tags ?? []"
      [searchQuery]="searchQuery()"
      (commentToggle)="toggleComment()"
      (copyKey)="copyKey.emit($event)"
      (editAction)="editTranslation.emit(translation())"
      (deleteAction)="deleteTranslation.emit(translation())"
    />

    <div
      class="compact-value"
      [class.compact-value--empty]="!primaryLocaleValue().trim() && !showComment()"
      [class.compact-value--comment]="showComment()"
      [title]="showComment() ? '' : (primaryLocaleValue().trim() || 'No translation')"
    >
      @if (showComment()) {
        <span class="comment-text">Comment: <span [innerHTML]="translation().comment | highlight : searchQuery()"></span></span>
      } @else {
        <span [innerHTML]="(primaryLocaleValue().trim() || 'No translation') | highlight : searchQuery()"></span>
      }
    </div>
  } @else {
    <!-- Full density: expanded details with overflow handling -->
    <app-translation-item-header
      [fullKey]="fullKey()"
      [localeStates]="localeStates()"
      [baseLocale]="baseLocale()"
      [tags]="translation().tags ?? []"
      [hideCommentButton]="true"
      [searchQuery]="searchQuery()"
      (copyKey)="copyKey.emit($event)"
      (editAction)="editTranslation.emit(translation())"
      (deleteAction)="deleteTranslation.emit(translation())"
    />

    <div class="base-value full" [class.expanded]="isExpanded()" [innerHTML]="baseValue() | highlight : searchQuery()">
    </div>

    <p class="comment-text full">Comment: <span [innerHTML]="(translation().comment || '-') | highlight : searchQuery()"></span></p>

    <app-translation-item-locales
      [localeTranslations]="localeTranslations()"
      [densityMode]="'full'"
      [isExpanded]="isExpanded()"
      [searchQuery]="searchQuery()"
    />

    @if (needsExpansion()) {
      <button
        class="expand-button"
        type="button"
        (click)="toggleExpansion()"
        [attr.aria-expanded]="isExpanded() ? 'true' : 'false'"
        aria-label="Toggle expansion"
      >
        <mat-icon [class.rotated]="isExpanded()">expand_more</mat-icon>
      </button>
    }
  }

  <ng-template cdkDragPlaceholder>
    <div class="drag-placeholder"></div>
  </ng-template>
</div>
