<button
  mat-stroked-button
  [matMenuTriggerFor]="localeMenu"
  data-testid="locale-filter-trigger"
  class="locale-filter-trigger"
  [attr.aria-label]="TOKENS.BROWSER.LOCALEFILTER.ARIALABELX | transloco : { text: store.localeFilterText() }"
  aria-haspopup="true"
>
  <mat-icon class="filter-icon">filter_list</mat-icon>
  <span class="filter-text">{{ store.localeFilterText() }}</span>
  <mat-icon class="arrow-icon">arrow_drop_down</mat-icon>
</button>

<mat-menu #localeMenu="matMenu" class="locale-filter-menu">
  @if (multiSelect()) {
    <div class="menu-header" tabindex="0" (click)="$event.stopPropagation()" (keyup.enter)="$event.stopPropagation()">
      <button
        mat-button
        class="action-button"
        (click)="selectAll()"
        data-testid="select-all"
      >
        {{ TOKENS.COMMON.ACTIONS.SELECTALL | transloco }}
      </button>
      <button
        mat-button
        class="action-button"
        (click)="clearAll()"
        data-testid="clear-all"
      >
        {{ TOKENS.COMMON.ACTIONS.CLEARALL | transloco }}
      </button>
    </div>

    @for (locale of displayedLocales(); track locale) {
      <button
        mat-menu-item
        (click)="toggleLocale(locale); $event.stopPropagation()"
        [attr.data-testid]="'locale-option-' + locale"
        [attr.aria-label]="locale + (isLocaleSelected(locale) ? ' (selected)' : ' (not selected)')"
        [attr.aria-checked]="isLocaleSelected(locale)"
        role="menuitemcheckbox"
        class="locale-option"
      >
        <mat-checkbox
          [checked]="isLocaleSelected(locale)"
          (click)="$event.preventDefault()"
          [attr.aria-hidden]="true"
          tabindex="-1"
          class="locale-checkbox"
        >
          {{ locale }}
        </mat-checkbox>
      </button>
    }
  } @else {
    @for (locale of displayedLocales(); track locale) {
      <button
        mat-menu-item
        (click)="selectLocale(locale)"
        [attr.data-testid]="'locale-option-' + locale"
        [attr.aria-label]="locale + (isLocaleSelected(locale) ? ' (selected)' : ' (not selected)')"
        [attr.aria-checked]="isLocaleSelected(locale)"
        role="menuitemradio"
        class="locale-option"
      >
        <mat-radio-button
          [checked]="isLocaleSelected(locale)"
          (click)="$event.preventDefault()"
          [attr.aria-hidden]="true"
          tabindex="-1"
          class="locale-radio"
        >
          {{ locale }}
        </mat-radio-button>
      </button>
    }
  }
</mat-menu>
