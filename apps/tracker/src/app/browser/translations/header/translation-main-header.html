<div class="translation-main-header">
  <div class="header-content">
    <app-translation-search />

    <app-locale-filter [multiSelect]="store.canShowMultipleLocales()" />

    <mat-button-toggle-group
      class="density-toggle"
      name="density"
      aria-label="Density mode"
      [value]="store.densityMode()"
      (change)="handleDensityChange($event)"
    >
      <mat-button-toggle value="compact" aria-label="Compact density" [attr.aria-current]="store.densityMode() === 'compact' ? 'true' : null" matTooltip="Compact — single locale, high density, best for scanning">
        <mat-icon>view_compact</mat-icon>
      </mat-button-toggle>

      <mat-button-toggle value="medium" aria-label="Medium density" [attr.aria-current]="store.densityMode() === 'medium' ? 'true' : null" matTooltip="Medium — balanced density with metadata">
        <mat-icon>view_comfortable</mat-icon>
      </mat-button-toggle>

      <mat-button-toggle value="full" aria-label="Full density" [attr.aria-current]="store.densityMode() === 'full' ? 'true' : null" matTooltip="Full — detailed view with comments and tags">
        <mat-icon>view_day</mat-icon>
      </mat-button-toggle>
    </mat-button-toggle-group>
  </div>
</div>
