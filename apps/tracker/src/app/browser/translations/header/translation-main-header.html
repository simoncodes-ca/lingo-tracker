<div class="translation-main-header">
  <div class="header-content">
    <app-translation-search />

    <app-locale-filter [multiSelect]="store.canShowMultipleLocales()" />

    <app-status-filter />

    <button
      mat-icon-button
      type="button"
      class="sort-direction-toggle"
      (click)="handleSortDirectionToggle()"
      [attr.aria-label]="(store.sortDirection() === 'asc' ? TOKENS.BROWSER.SORTDESCENDING : TOKENS.BROWSER.SORTASCENDING) | transloco"
      [attr.aria-pressed]="store.sortDirection() === 'desc'"
      [matTooltip]="(store.sortDirection() === 'asc' ? TOKENS.BROWSER.SORTDESCENDINGTOOLTIP : TOKENS.BROWSER.SORTASCENDINGTOOLTIP) | transloco"
    >
      <mat-icon>{{ store.sortDirection() === 'asc' ? 'arrow_upward' : 'arrow_downward' }}</mat-icon>
    </button>

    <button
      mat-raised-button
      color="primary"
      (click)="handleAddTranslation()"
      [disabled]="store.isDisabled() || !store.currentFolderPath()"
      [matTooltip]="(!store.currentFolderPath() ? TOKENS.BROWSER.SELECTFOLDERFIRST : TOKENS.BROWSER.ADDNEWTRANSLATIONTOOLTIP) | transloco"
      [attr.aria-label]="TOKENS.BROWSER.ADDTRANSLATIONBUTTON | transloco"
    >
      <mat-icon>add</mat-icon>
      <span>{{ TOKENS.BROWSER.ADDTRANSLATIONBUTTON | transloco }}</span>
    </button>

    <button
      mat-icon-button
      type="button"
      class="density-toggle"
      [matTooltip]="(store.densityMode() === 'compact' ? TOKENS.BROWSER.DENSITY.FULLTOOLTIP : TOKENS.BROWSER.DENSITY.COMPACTTOOLTIP) | transloco"
      [attr.aria-label]="(store.densityMode() === 'compact' ? TOKENS.BROWSER.DENSITY.FULLTOOLTIP : TOKENS.BROWSER.DENSITY.COMPACTTOOLTIP) | transloco"
      [attr.aria-pressed]="store.densityMode() === 'compact'"
      (click)="handleDensityToggle()"
    >
      <mat-icon [class.icon-flip]="isDensityToggleFlipping()">{{ store.densityMode() === 'compact' ? 'view_compact' : 'view_day' }}</mat-icon>
    </button>
  </div>
</div>
