<div class="translation-main-header">
  <div class="breadcrumb-row">
    @if (formattedFolderPath(); as path) {
      <mat-icon class="breadcrumb-icon">folder</mat-icon>
      <span class="breadcrumb-path">{{ path }}</span>
    } @else {
      <span class="breadcrumb-empty">{{ TOKENS.BROWSER.NOFOLDERSELECTED | transloco }}</span>
    }
  </div>

  <div class="header-content">
    <app-translation-search />

    <app-locale-filter [multiSelect]="store.canShowMultipleLocales()" />

    <app-status-filter />

    <button
      type="button"
      class="sort-direction-toggle"
      (click)="handleSortDirectionToggle()"
      [attr.aria-label]="(store.sortDirection() === 'asc' ? TOKENS.BROWSER.SORTASCENDING : TOKENS.BROWSER.SORTDESCENDING) | transloco"
      [matTooltip]="(store.sortDirection() === 'asc' ? TOKENS.BROWSER.SORTASCENDINGTOOLTIP : TOKENS.BROWSER.SORTDESCENDINGTOOLTIP) | transloco"
    >
      <mat-icon>{{ store.sortDirection() === 'asc' ? 'arrow_upward' : 'arrow_downward' }}</mat-icon>
    </button>

    <button
      mat-raised-button
      color="primary"
      (click)="handleAddTranslation()"
      [disabled]="store.isDisabled() || !store.currentFolderPath()"
      [matTooltip]="(!store.currentFolderPath() ? TOKENS.BROWSER.SELECTFOLDERFIRST : TOKENS.BROWSER.ADDNEWTRANSLATIONTOOLTIP) | transloco"
      [attr.aria-label]="TOKENS.BROWSER.ADDTRANSLATIONBUTTON | transloco"
    >
      <mat-icon>add</mat-icon>
      <span>{{ TOKENS.BROWSER.ADDTRANSLATIONBUTTON | transloco }}</span>
    </button>

    <mat-button-toggle-group
      class="density-toggle"
      name="density"
      [attr.aria-label]="TOKENS.BROWSER.DENSITY.MODEARIALABEL | transloco"
      [value]="store.densityMode()"
      (change)="handleDensityChange($event)"
    >
      <mat-button-toggle value="compact" [attr.aria-label]="TOKENS.BROWSER.DENSITY.COMPACTARIALABEL | transloco" [attr.aria-current]="store.densityMode() === 'compact' ? 'true' : null" [matTooltip]="TOKENS.BROWSER.DENSITY.COMPACTTOOLTIP | transloco">
        <mat-icon>view_compact</mat-icon>
      </mat-button-toggle>

      <mat-button-toggle value="full" [attr.aria-label]="TOKENS.BROWSER.DENSITY.FULLARIALABEL | transloco" [attr.aria-current]="store.densityMode() === 'full' ? 'true' : null" [matTooltip]="TOKENS.BROWSER.DENSITY.FULLTOOLTIP | transloco">
        <mat-icon>view_day</mat-icon>
      </mat-button-toggle>
    </mat-button-toggle-group>
  </div>
</div>
