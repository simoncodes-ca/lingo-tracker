<div class="folder-picker">
  <!-- Folder Display Header (Clickable) -->
  <div
    class="folder-header"
    (click)="toggleExpanded()"
    [attr.aria-expanded]="isExpanded()"
    [attr.aria-label]="'Folder selector, currently: ' + displayPath()"
    role="button"
    tabindex="0"
    (keydown.enter)="toggleExpanded()"
    (keydown.space)="toggleExpanded()"
  >
    <mat-icon class="folder-icon">folder</mat-icon>
    <span class="folder-label">Folder:</span>
    <span class="folder-path">{{ displayPath() }}</span>
    <mat-icon class="chevron-icon">{{ chevronIcon() }}</mat-icon>
  </div>

  <!-- Expandable Folder Picker Section -->
  @if (isExpanded()) {
    <div class="folder-picker-content">
      @if (!hasRootFolders()) {
        <!-- Empty State -->
        <div class="empty-state">
          <mat-icon class="empty-icon">create_new_folder</mat-icon>
          <p class="empty-message">No folders yet</p>
          <button
            mat-raised-button
            color="primary"
            class="create-first-folder-button"
            (click)="onCreateFirstFolder()"
            type="button"
          >
            <mat-icon>add</mat-icon>
            Create First Folder
          </button>
        </div>
      } @else {
        <!-- Folder Tree -->
        <div
          class="folder-tree-container"
          (keydown)="onTreeKeydown($event)"
          tabindex="0"
          role="tree"
          [attr.aria-label]="'Folder tree'"
        >
          @for (folder of rootFolders(); track folder.fullPath) {
            <app-picker-folder-node
              [folder]="folder"
              [selectedPath]="selectedPath()"
              [focusedPath]="focusedPath()"
              [expandedPaths]="expandedPaths()"
              [isAddingFolder]="isAddingFolder()"
              [addFolderParentPath]="addFolderParentPath()"
              (folderSelect)="onFolderSelect($event)"
              (toggleExpand)="onExpandToggle($event)"
              (addFolder)="onAddFolder($event)"
              (confirmNewFolder)="onFolderNameConfirmed($event)"
              (cancelNewFolder)="onFolderNameCancelled()"
            />
          }
        </div>
      }
    </div>
  }
</div>
