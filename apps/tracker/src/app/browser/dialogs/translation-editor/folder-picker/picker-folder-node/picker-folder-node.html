<div class="picker-folder-node">
  <!-- Folder Row -->
  <div
    class="folder-row"
    [class.selected]="isSelected()"
    [class.focused]="isFocused()"
    (click)="onFolderClick()"
    (keydown)="onKeydown($event)"
    [attr.role]="'treeitem'"
    [attr.tabindex]="isFocused() ? 0 : -1"
    [attr.aria-label]="TOKENS.BROWSER.FOLDERPICKER.FOLDERARIALABELX | transloco : { name: folder().name }"
    [attr.aria-selected]="isSelected()"
    [attr.aria-expanded]="hasChildren() ? isExpanded() : null"
  >
    <!-- Expand/Collapse Button -->
    @if (hasChildren()) {
      <button
        mat-icon-button
        class="expand-button"
        (click)="onExpandClick($event)"
        [attr.aria-label]="(isExpanded() ? TOKENS.BROWSER.FOLDERPICKER.COLLAPSE : TOKENS.BROWSER.FOLDERPICKER.EXPAND) | transloco"
      >
        <mat-icon>{{ expandIcon() }}</mat-icon>
      </button>
    } @else {
      <div class="expand-placeholder"></div>
    }

    <!-- Folder Icon -->
    <mat-icon class="folder-icon">folder</mat-icon>

    <!-- Folder Name -->
    <span class="folder-name">{{ folder().name }}</span>

    <!-- Checkmark for Selected State -->
    @if (isSelected()) {
      <mat-icon class="checkmark-icon">check</mat-icon>
    }

    <!-- Add Folder Button -->
    <button
      mat-icon-button
      class="add-button"
      (click)="onAddFolderClick($event)"
      [attr.aria-label]="TOKENS.BROWSER.FOLDERPICKER.ADDSUBFOLDERTOX | transloco : { name: folder().name }"
    >
      <mat-icon>add</mat-icon>
    </button>
  </div>

  <!-- Children -->
  @if (isExpanded()) {
    <div class="folder-children">
      @if (shouldShowInlineInput()) {
        <app-inline-folder-input
          [parentPath]="folder().fullPath"
          (confirm)="onFolderConfirm($event)"
          (cancelInput)="onFolderCancel()"
        />
      }
      @if (folder().tree?.children) {
        @for (child of folder().tree!.children; track child.fullPath) {
          <app-picker-folder-node
            [folder]="child"
            [selectedPath]="selectedPath()"
            [expandedPaths]="expandedPaths()"
            [focusedPath]="focusedPath()"
            [isAddingFolder]="isAddingFolder()"
            [addFolderParentPath]="addFolderParentPath()"
            (folderSelect)="folderSelect.emit($event)"
            (toggleExpand)="toggleExpand.emit($event)"
            (addFolder)="addFolder.emit($event)"
            (confirmNewFolder)="confirmNewFolder.emit($event)"
            (cancelNewFolder)="cancelNewFolder.emit()"
          />
        }
      }
    </div>
  }
</div>
