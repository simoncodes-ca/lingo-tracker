<h2 class="mat-dialog-title">Move Resource</h2>
<button mat-icon-button class="close-button" aria-label="Close" (click)="close()">
  <mat-icon>close</mat-icon>
</button>
<div class="mat-dialog-content placeholder">
  <p>Move functionality coming soon</p>
  <p class="meta">Key: {{ data.resource.key }}</p>
  <p class="meta">Collection: {{ data.collectionName }}</p>
</div>
<div class="mat-dialog-actions">
  <button mat-button (click)="close()">Cancel</button>
</div>
