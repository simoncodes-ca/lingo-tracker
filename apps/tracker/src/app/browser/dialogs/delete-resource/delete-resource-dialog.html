<h2 class="mat-dialog-title" id="dialog-title">Delete Resource</h2>
<button mat-icon-button class="close-button" aria-label="Close dialog" (click)="cancel()">
  <mat-icon>close</mat-icon>
</button>
<div class="mat-dialog-content" role="document" aria-describedby="dialog-message">
  <p id="dialog-message">Are you sure you want to delete '{{ data.resource.key }}'? This action cannot be undone.</p>
</div>
<div class="mat-dialog-actions">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-button color="warn" (click)="confirm()">Delete</button>
</div>
