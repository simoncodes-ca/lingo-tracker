<div
  class="folder-node"
  [class.disabled]="disabled()"
>
  <!-- Drop Zone: wraps only the header, NOT children, to avoid nested cdkDropList -->
  <div
    class="folder-drop-zone"
    [class.drop-target-valid]="isHoveredDuringDrag() && activeDragData() && isValidDropTarget()"
    [class.drop-target-invalid]="isHoveredDuringDrag() && activeDragData() && !isValidDropTarget()"
    cdkDropList
    [cdkDropListData]="folder().fullPath"
    [cdkDropListEnterPredicate]="canDrop"
    [cdkDropListSortingDisabled]="true"
    (cdkDropListDropped)="onDrop($event)"
    (cdkDropListEntered)="onDropListEntered()"
    (cdkDropListExited)="onDropListExited()"
  >
    <!-- Folder Header -->
    <div
      class="folder-header"
      [class.selected]="isSelected()"
      [class.unloaded]="!folder().loaded"
      (click)="onFolderClick()"
      [attr.role]="disabled() ? 'presentation' : 'treeitem'"
      [attr.tabindex]="disabled() ? -1 : 0"
      [attr.aria-label]="'Folder ' + folder().name"
      [attr.aria-expanded]="folder().loaded ? 'true' : 'false'"
      [attr.aria-selected]="isSelected()"
      (keydown.enter)="onFolderClick()"
      (keydown.space)="onFolderClick()"
      (keydown.delete)="onDeleteKeydown($event)"
      cdkDrag
      [cdkDragData]="dragData()"
      [cdkDragDisabled]="disabled()"
      (cdkDragStarted)="onDragStarted()"
      (cdkDragEnded)="onDragEnded()"
    >
    <mat-icon class="folder-icon folder-drag-handle" cdkDragHandle aria-label="Drag to move folder">{{ folderIcon() }}</mat-icon>
    <span class="folder-name">{{ folder().name }}</span>
    @if (isNewlyCreated()) {
      <span class="new-chip">New</span>
    }
    <button
      mat-icon-button
      class="delete-button"
      [disabled]="disabled()"
      (click)="onDeleteClick($event)"
      [attr.aria-label]="'Delete folder ' + folder().name"
    >
      @if (isDeleting()) {
        <mat-icon class="spinner">refresh</mat-icon>
      } @else {
        <mat-icon>delete</mat-icon>
      }
    </button>
  </div>
  </div>

  <!-- Loaded Children -->
  @if (folder().loaded && folder().tree) {
    <div class="folder-children">
      @if (shouldShowInlineInput()) {
        <app-inline-folder-input
          [parentPath]="folder().fullPath"
          (confirm)="onFolderConfirm($event)"
          (cancelInput)="onFolderCancel()"
        />
      }
      @for (child of folder().tree!.children; track child.fullPath) {
        <app-folder-node
          [folder]="child"
          [selectedPath]="selectedPath()"
          [showNestedResources]="showNestedResources()"
          [disabled]="disabled()"
          [activeDragData]="activeDragData()"
          (folderClick)="folderClick.emit($event)"
          (loadFolder)="loadFolder.emit($event)"
          (deleteFolder)="deleteFolder.emit($event)"
          (resourceDropped)="resourceDropped.emit($event)"
          (folderDropped)="folderDropped.emit($event)"
          (dragStarted)="dragStarted.emit($event)"
          (dragEnded)="dragEnded.emit()"
        />
      }
    </div>
  }
</div>
