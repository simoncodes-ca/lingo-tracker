<div class="folder-sidebar-header">
  <div class="header-content">
    <button
      mat-icon-button
      type="button"
      (click)="onBackButtonClick()"
      [attr.aria-label]="TOKENS.COMMON.ACTIONS.BACK | transloco"
      class="back-button"
    >
      <mat-icon>arrow_back</mat-icon>
    </button>
    <div class="header-text">
      <div class="header-row">
        <h2 class="collection-name">{{ collectionName() }}</h2>
        @if (statsLoading()) {
          <div class="header-stats">
            <div class="skeleton-chip"></div>
            <div class="skeleton-chip"></div>
          </div>
        } @else if (shouldDisplayStats()) {
          <div class="header-stats">
            <span class="stat-chip">{{ keysText() }}</span>
            <span class="stat-chip">{{ localesText() }}</span>
          </div>
        }
      </div>
      <p class="translations-folder">{{ translationsFolder() }}</p>
    </div>
    <button
      mat-icon-button
      type="button"
      (click)="onAddFolderButtonClick()"
      aria-label="Add folder"
      matTooltip="Add folder (Ctrl+Shift+N)"
      class="add-folder-button"
    >
      <mat-icon>create_new_folder</mat-icon>
    </button>
  </div>
</div>
