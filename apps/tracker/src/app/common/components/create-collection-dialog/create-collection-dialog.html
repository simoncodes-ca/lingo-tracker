<div class="dialog-header">
  <h2 mat-dialog-title>Create collection</h2>
  <button class="close-button" mat-icon-button (click)="onCancel()">
    <mat-icon>close</mat-icon>
  </button>
</div>

<div class="dialog-content">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="row">
      <mat-form-field appearance="outline">
        <mat-label>Collection name</mat-label>
        <input matInput formControlName="name" required />
        <mat-error *ngIf="form.controls.name.hasError('required')">Required</mat-error>
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Translations folder</mat-label>
        <input matInput formControlName="translationsFolder" required />
        <mat-error *ngIf="form.controls.translationsFolder.hasError('required')">Required</mat-error>
      </mat-form-field>
    </div>
    <div class="row">
      <mat-form-field appearance="outline" class="flex-1">
        <mat-label>Export folder (optional)</mat-label>
        <input matInput formControlName="exportFolder" />
      </mat-form-field>
      <mat-form-field appearance="outline" class="flex-1">
        <mat-label>Import folder (optional)</mat-label>
        <input matInput formControlName="importFolder" />
      </mat-form-field>
    </div>
    <div class="row">
      <mat-form-field appearance="outline" class="flex-1">
        <mat-label>Base locale (optional)</mat-label>
        <input matInput formControlName="baseLocale" />
      </mat-form-field>
      <mat-form-field appearance="outline" class="flex-1">
        <mat-label>Subfolder split threshold (optional)</mat-label>
        <input matInput type="number" formControlName="subfolderSplitThreshold" />
      </mat-form-field>
    </div>
    <mat-form-field appearance="outline">
      <mat-label>Locales (comma-separated, optional)</mat-label>
      <input matInput formControlName="localesInput" placeholder="en,fr-ca,es" />
    </mat-form-field>
    <div class="actions">
      <button type="submit" mat-flat-button color="primary" [disabled]="form.invalid || submitting">Create</button>
      <button type="button" mat-button color="secondary" (click)="onCancel()">Cancel</button>
    </div>
  </form>
</div>
